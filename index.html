<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon: use the real /favicon.svg file -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- Viewport: lock to mobile-first, no zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- SEO -->
    <meta name="description" content="Lumina – Premium glassmorphism reminder app with offline support, background notifications, and encrypted backup." />
    <meta name="keywords" content="reminder, productivity, offline, PWA, notifications, alarm" />
    <meta name="author" content="Lumina" />

    <!-- PWA Theme -->
    <meta name="theme-color" content="#0b0a19" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Lumina" />

    <!-- PWA iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lumina" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (share preview) -->
    <meta property="og:title" content="Lumina – Premium Reminder App" />
    <meta property="og:description" content="Glassmorphism reminder app with offline support and background notifications." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Lumina – Premium Reminder App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
